<!DOCTYPE html>
<html>
<body>
<canvas id="c" width="400" height="400"></canvas>
<script>
  const ctx = document.getElementById('c').getContext('2d');
  
  ctx.globalAlpha = 0.3;
  ctx.strokeStyle = '#FFFF00';
  ctx.lineWidth = 20;
  ctx.beginPath();
  ctx.moveTo(50, 50);
  ctx.lineTo(350, 50);
  ctx.stroke();
  ctx.globalAlpha = 1;
  
  ctx.globalAlpha = 0.3;
  ctx.strokeStyle = '#0000FF';
  ctx.lineWidth = 20;
  ctx.beginPath();
  ctx.moveTo(200, 20);
  ctx.lineTo(200, 380);
  ctx.stroke();
  ctx.globalAlpha = 1;
</script>
</body>
</html>
